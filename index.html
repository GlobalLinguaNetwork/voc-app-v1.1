<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Portal</title>
<style>
:root { --primary: #1a237e; --bg: #f5f7fa; --text: #2c3e50; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); max-width: 500px; margin: auto; padding: 40px 20px; }
.card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
h2 { text-align: center; color: var(--primary); font-weight: 700; margin-bottom: 30px; }
label { display: block; margin-top: 15px; font-size: 0.9rem; font-weight: bold; color: #666; }
select, input { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
button { width: 100%; padding: 15px; margin-top: 25px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
button:hover { opacity: 0.9; transform: translateY(-2px); }
</style>
</head>
<body>

<div class="card">
  <h2>Vocab Master</h2>
  <label>単語帳</label>
  <select id="book">
    <option value="system5">システム英単語（5訂版）</option>
    <option value="target1900">英単語ターゲット1900</option>
    <option value="target1200">英単語ターゲット1200</option>
    <option value="leap">英単語LEAP</option>
    <option value="sokutanh8">速読英単語（必修編 8訂版）</option>
    <option value="jukugo1000">英熟語ターゲット1000</option>
    <option value="gohou">語法</option>
    <option value="kihonndoushi">基本動詞</option>
    <option value="tagigo">多義語</option>
    <option value="ronrimarker">論理マーカー</option>
  </select>
  
  <label>生徒ID</label>
  <input type="text" id="user" placeholder="例：Student01">
  
  <button onclick="start()">学習を開始する</button>
</div>

<script>
function start(){
  const book = document.getElementById("book").value;
  const user = document.getElementById("user").value || "guest";
  location.href = `study.html?book=${book}&user=${user}`;
}
</script>
</body>
</html>
