<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語学習ポータル</title>

<style>
body { font-family:sans-serif; max-width:600px; margin:auto; padding:20px;}
.card { border:1px solid #ccc; border-radius:10px; padding:20px;}
button { padding:12px; margin-top:10px; width:100%; border-radius:8px;}
select, input { padding:10px; width:100%; margin-top:10px;}
</style>
</head>

<body>

<h2>単語学習システム</h2>

<div class="card">

<label>単語帳を選択</label>
<select id="book"></select>

<label>生徒IDを入力</label>
<input type="text" id="user" placeholder="例：A001">

<button onclick="start()">学習スタート</button>

</div>

<script>

// ▼ 単語帳リスト（ここを追加するだけで拡張OK）
const books = [
  { id: "system5", name: "システム英単語（5訂版）" },
  { id: "target1900", name: "ターゲット1900" },
  { id: "target1400", name: "ターゲット1400" },
  { id: "target1200", name: "ターゲット1200" },
  { id: "leap", name: "LEAP（改訂版）" },
  { id: "jukugo1000", name: "熟語ターゲット1000" }
];

// ▼ セレクト自動生成
const select = document.getElementById("book");

books.forEach(book => {
  const option = document.createElement("option");
  option.value = book.id;
  option.textContent = book.name;
  select.appendChild(option);
});

// ▼ スタート
function start(){
  const book = select.value;
  const user = document.getElementById("user").value || "guest";

  location.href = `study.html?book=${book}&user=${user}`;
}

</script>

</body>
</html>
