<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study - Vocab Master</title>
<style>
:root { --primary: #1a237e; --accent: #00bcd4; --bg: #f0f2f5; --correct: #4caf50; --wrong: #f44336; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
.container { max-width: 500px; margin: auto; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 10px; }
.card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 15px; min-height: 180px; display: flex; flex-direction: column; justify-content: center; position: relative; }
h2#word { font-size: 2.4rem; margin: 0; color: var(--primary); }
p#example { color: #666; font-style: italic; margin-top: 10px; min-height: 1.2em; }
p#meaning { font-size: 1.1rem; font-weight: bold; color: var(--accent); margin-top: 15px; background: #e0f7fa; padding: 10px; border-radius: 10px; }
.quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
button.ans-btn { background: white; border: 1px solid #eee; padding: 15px 10px; border-radius: 12px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.correct { background: var(--correct) !important; color: white !important; border: none !important; }
.wrong { background: var(--wrong) !important; color: white !important; border: none !important; }
.hidden { display: none; }
.invisible { visibility: hidden; }
.progress-bar { font-size: 0.8rem; color: #888; text-align: center; margin-bottom: 5px; }
.action-btns { display: flex; gap: 5px; margin-top: 15px; }
.btn-small { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
.btn-pause { background: #ffa000; color: white; }
.btn-stop { background: #e91e63; color: white; }
select { padding: 12px; width: 100%; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; }
.finish-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <span style="font-weight: bold; color: var(--primary);">Vocab Master</span>
    <div id="accuracy" style="font-size: 0.9rem; background: #fff; padding: 4px 10px; border-radius: 20px;">正答率: 0%</div>
  </div>

  <!-- 設定エリア -->
  <div id="setupArea" class="card">
    <label style="font-size: 0.8rem; color: #666; margin-bottom: 5px; text-align: left;">学習モード</label>
    <select id="mode">
      <option value="quiz">四択クイズ</option>
      <option value="flash">カードめくり</option>
    </select>
    
    <label style="font-size: 0.8rem; color: #666; margin-bottom: 5px; text-align: left;">自動解答表示の時間</label>
    <select id="revealSpeed">
      <option value="5000">5秒</option>
      <option value="10000">10秒</option>
      <option value="0">選択するまで待つ</option>
    </select>

    <button onclick="start()" style="background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem;">学習を開始する</button>
  </div>

  <!-- 学習エリア -->
  <div id="studyArea" class="hidden">
    <div class="progress-bar" id="progress">0 / 0</div>
    <div class="card">
      <h2 id="word"></h2>
      <p id="example"></p>
      <p id="meaning" class="invisible"></p>

      <!-- 終了画面（初期は非表示） -->
      <div id="finishScreen" class="finish-screen hidden">
        <h2 style="color: var(--primary)">Unit Finished!</h2>
        <p id="finalScore"></p>
        <button onclick="restart()" style="background: var(--correct); color: white; border: none; padding: 12px; margin: 5px; width: 80%; border-radius: 10px; font-weight: bold; cursor: pointer;">もう一度このユニットをやる</button>
        <button onclick="stopStudy()" style="background: #666; color: white; border: none; padding: 12px; margin: 5px; width: 80%; border-radius: 10px; font-weight: bold; cursor: pointer;">ポータルに戻る</button>
      </div>
    </div>

    <div id="quizArea" class="quiz-grid"></div>

    <div class="action-btns">
      <button id="pauseBtn" class="btn-small btn-pause" onclick="togglePause()">一時停止</button>
      <button class="btn-small btn-stop" onclick="stopStudy()">終了</button>
    </div>
  </div>
</div>

<script>
let words = [], index = 0, correctCount = 0, totalCount = 0, reviewQueue = [];
let current, timer1, timer2, isPaused = false;

const params = new URLSearchParams(location.search);
const book = params.get("book") || "system5";
const user = params.get("user") || "default";

fetch(`data/${book}/unit1.json`)
  .then(res => res.json())
  .then(data => { words = data; })
  .catch(err => alert("データの読み込みに失敗しました。パスを確認してください。"));

function start() {
  if (words.length === 0) return alert("データを読み込み中です...");
  document.getElementById("setupArea").style.display = "none";
  document.getElementById("studyArea").classList.remove("hidden");
  next();
}

function next() {
  if (isPaused) return;
  clearTimeout(timer1);
  clearTimeout(timer2);
  speechSynthesis.cancel();

  // セット終了判定（復習キューが空かつ、全単語終わった場合）
  if (index >= words.length && reviewQueue.length === 0) {
    showFinishScreen();
    return;
  }

  current = (reviewQueue.length > 0) ? reviewQueue.shift() : words[index++];

  document.getElementById("word").textContent = current.word;
  document.getElementById("example").textContent = current.example || "";
  // 修正：例文訳を優先的に表示
  document.getElementById("meaning").textContent = current.example_ja || current.meaning;
  document.getElementById("meaning").classList.add("invisible");
  document.getElementById("progress").textContent = `${index} / ${words.length}`;

  speak(current.word, () => { if(current.example) speak(current.example); });

  const mode = document.getElementById("mode").value;
  if (mode === "quiz") {
    generateQuiz();
  } else {
    document.getElementById("quizArea").innerHTML = `<button class="ans-btn" style="grid-column: 1/3; background: var(--primary); color: white;" onclick="flip()">意味を見る</button>`;
  }

  // 自動表示設定の反映
  const speed = parseInt(document.getElementById("revealSpeed").value);
  if (speed > 0) {
    timer1 = setTimeout(autoReveal, speed);
    timer2 = setTimeout(next, speed + 3000); // 表示してから3秒後に次へ
  }
}

function speak(text, callback) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  utter.rate = 1.1; 
  utter.onend = callback;
  speechSynthesis.speak(utter);
}

function generateQuiz() {
  let choices = [current.meaning];
  while (choices.length < 4) {
    let r = words[Math.floor(Math.random() * words.length)].meaning;
    if (!choices.includes(r)) choices.push(r);
  }
  choices.sort(() => Math.random() - 0.5);
  document.getElementById("quizArea").innerHTML = choices.map(c => 
    `<button class="ans-btn" onclick="answer('${c}', this)">${c}</button>`
  ).join("");
}

function answer(selected, btn) {
  totalCount++;
  clearTimeout(timer1);
  clearTimeout(timer2);

  if (selected === current.meaning) {
    correctCount++;
    btn.classList.add("correct");
    autoReveal();
    setTimeout(next, 1000); // 正解時は1秒で次へ
  } else {
    reviewQueue.push(current);
    btn.classList.add("wrong");
    autoReveal();
    setTimeout(next, 3000); // 間違い時は3秒待ってから次へ
  }
  updateAccuracy();
}

function flip() {
  document.getElementById("meaning").classList.remove("invisible");
  // めくりモードの時は、2秒後に次へ
  setTimeout(next, 2000);
}

function autoReveal() {
  document.getElementById("meaning").classList.remove("invisible");
  document.querySelectorAll(".ans-btn").forEach(b => {
    if (b.textContent === current.meaning) b.classList.add("correct");
  });
}

function togglePause() {
  isPaused = !isPaused;
  const btn = document.getElementById("pauseBtn");
  if (isPaused) {
    clearTimeout(timer1);
    clearTimeout(timer2);
    speechSynthesis.cancel();
    btn.textContent = "再開";
    btn.style.background = "#4caf50";
  } else {
    btn.textContent = "一時停止";
    btn.style.background = "#ffa000";
    next();
  }
}

function showFinishScreen() {
  const screen = document.getElementById("finishScreen");
  screen.classList.remove("hidden");
  document.getElementById("finalScore").textContent = `最終正答率: ${Math.round((correctCount / totalCount) * 100)}%`;
}

function restart() {
  index = 0;
  correctCount = 0;
  totalCount = 0;
  reviewQueue = [];
  document.getElementById("finishScreen").classList.add("hidden");
  updateAccuracy();
  next();
}

function stopStudy() {
  location.href = "index.html";
}

function updateAccuracy() {
  const acc = totalCount ? Math.round((correctCount / totalCount) * 100) : 0;
  document.getElementById("accuracy").textContent = `正答率: ${acc}%`;
}
</script>
</body>
</html>
