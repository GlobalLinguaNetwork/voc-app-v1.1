<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study - Vocab Master</title>
<style>
:root { --primary: #1a237e; --accent: #00bcd4; --bg: #f0f2f5; --correct: #4caf50; --wrong: #f44336; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
.container { max-width: 500px; margin: auto; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 10px; }
.card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 15px; min-height: 180px; display: flex; flex-direction: column; justify-content: center; }
h2#word { font-size: 2.4rem; margin: 0; color: var(--primary); }
p#example { color: #666; font-style: italic; margin-top: 10px; min-height: 1.2em; }
p#meaning { font-size: 1.2rem; font-weight: bold; color: var(--accent); margin-top: 15px; }
.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
.btn-control { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }
.quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
button.ans-btn { background: white; border: 1px solid #eee; padding: 15px 10px; border-radius: 12px; font-size: 0.95rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; }
.correct { background: var(--correct) !important; color: white !important; border: none !important; }
.wrong { background: var(--wrong) !important; color: white !important; border: none !important; }
.hidden { visibility: hidden; }
.progress-bar { font-size: 0.8rem; color: #888; text-align: center; margin-bottom: 5px; }
.action-btns { display: flex; gap: 5px; margin-top: 10px; }
.btn-small { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
.btn-pause { background: #ffa000; color: white; }
.btn-stop { background: #e91e63; color: white; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <span style="font-weight: bold; color: var(--primary);">Vocab Master</span>
    <div id="accuracy" style="font-size: 0.9rem; background: #fff; padding: 4px 10px; border-radius: 20px;">正答率: 0%</div>
  </div>

  <!-- 設定エリア -->
  <div id="setupArea" class="card">
    <select id="mode" style="padding: 10px; margin-bottom: 10px; border-radius: 8px;">
      <option value="quiz">四択クイズモード</option>
      <option value="flash">フラッシュカードモード</option>
    </select>
    <button onclick="start()" style="background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;">学習を開始する</button>
  </div>

  <!-- 学習エリア -->
  <div id="studyArea" class="hidden">
    <div class="progress-bar" id="progress">0 / 0</div>
    <div class="card">
      <h2 id="word"></h2>
      <p id="example"></p>
      <p id="meaning" class="hidden"></p>
    </div>

    <div id="quizArea" class="quiz-grid"></div>

    <div class="action-btns">
      <button id="pauseBtn" class="btn-small btn-pause" onclick="togglePause()">一時停止</button>
      <button class="btn-small btn-stop" onclick="stopStudy()">終了</button>
    </div>
  </div>
</div>

<script>
let words = [], index = 0, correctCount = 0, totalCount = 0, reviewQueue = [];
let current, timer1, timer2, isPaused = false;

const params = new URLSearchParams(location.search);
const book = params.get("book") || "system5";
const user = params.get("user") || "default";

// データ読み込み（パスを自動判定）
fetch(`data/${book}/unit1.json`)
  .then(res => res.json())
  .then(data => { words = data; })
  .catch(err => alert("データの読み込みに失敗しました。"));

function start() {
  if (words.length === 0) return alert("データを読み込み中です...");
  document.getElementById("setupArea").style.display = "none";
  document.getElementById("studyArea").classList.remove("hidden");
  next();
}

function next() {
  if (isPaused) return;
  clearTimeout(timer1);
  clearTimeout(timer2);
  speechSynthesis.cancel();

  current = (reviewQueue.length > 0) ? reviewQueue.shift() : words[index++ % words.length];

  document.getElementById("word").textContent = current.word;
  document.getElementById("example").textContent = current.example || "";
  // 修正点：意味の場所に「例文の日本語訳」を表示するようにセット
  document.getElementById("meaning").textContent = current.example_ja || current.meaning;
  document.getElementById("meaning").classList.add("hidden");
  document.getElementById("progress").textContent = `${index} / ${words.length}`;

  speak(current.word, () => { if(current.example) speak(current.example); });

  const mode = document.getElementById("mode").value;
  if (mode === "quiz") {
    generateQuiz();
  } else {
    document.getElementById("quizArea").innerHTML = `<button class="ans-btn" style="grid-column: 1/3" onclick="flip()">めくる</button>`;
  }

  // ★スピードアップ：表示まで1.5秒、次まで3.5秒に短縮
  timer1 = setTimeout(autoReveal, 1500);
  timer2 = setTimeout(next, 3500);
}

function speak(text, callback) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  utter.rate = 1.1; // 少し早口に
  utter.onend = callback;
  speechSynthesis.speak(utter);
}

function generateQuiz() {
  let choices = [current.meaning];
  while (choices.length < 4) {
    let r = words[Math.floor(Math.random() * words.length)].meaning;
    if (!choices.includes(r)) choices.push(r);
  }
  choices.sort(() => Math.random() - 0.5);
  document.getElementById("quizArea").innerHTML = choices.map(c => 
    `<button class="ans-btn" onclick="answer('${c}', this)">${c}</button>`
  ).join("");
}

function answer(selected, btn) {
  totalCount++;
  if (selected === current.meaning) {
    correctCount++;
    btn.classList.add("correct");
  } else {
    reviewQueue.push(current);
    btn.classList.add("wrong");
    autoReveal();
  }
  updateAccuracy();
  setTimeout(next, 800); // 正解したらすぐ次へ
}

function flip() {
  document.getElementById("meaning").classList.remove("hidden");
}

function autoReveal() {
  document.getElementById("meaning").classList.remove("hidden");
  document.querySelectorAll(".ans-btn").forEach(b => {
    if (b.textContent === current.meaning) b.classList.add("correct");
  });
}

function togglePause() {
  isPaused = !isPaused;
  const btn = document.getElementById("pauseBtn");
  if (isPaused) {
    clearTimeout(timer1);
    clearTimeout(timer2);
    speechSynthesis.cancel();
    btn.textContent = "再開";
    btn.style.background = "#4caf50";
  } else {
    btn.textContent = "一時停止";
    btn.style.background = "#ffa000";
    next();
  }
}

function stopStudy() {
  if (confirm("学習を終了してポータルに戻りますか？")) {
    location.href = "index.html";
  }
}

function updateAccuracy() {
  const acc = Math.round((correctCount / totalCount) * 100);
  document.getElementById("accuracy").textContent = `正答率: ${acc}%`;
}
</script>
</body>
</html>
